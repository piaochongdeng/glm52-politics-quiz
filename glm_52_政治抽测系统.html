<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八下道法 · 考前必背大题抽测系统</title>
<style>
:root {
    --primary: #4f46e5; --primary-light: #818cf8; --primary-bg: #eef2ff;
    --success: #16a34a; --success-bg: #f0fdf4; --danger: #dc2626; --danger-bg: #fef2f2;
    --warning: #d97706; --warning-bg: #fffbeb; --text: #1e293b; --text-secondary: #64748b;
    --border: #e2e8f0; --card-bg: #ffffff; --body-bg: #f8fafc;
    --shadow: 0 1px 3px rgba(0,0,0,.08); --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
    --radius: 14px; --radius-sm: 10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
    background:var(--body-bg);color:var(--text);min-height:100vh;font-size:17px;
}
.app-header{
    background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);color:#fff;
    padding:28px 20px 22px;text-align:center;position:relative;overflow:hidden;
}
.app-header::after{
    content:'';position:absolute;inset:0;
    background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
    opacity:.5;
}
.app-header h1{font-size:26px;font-weight:700;position:relative;letter-spacing:1px}
.app-header p{font-size:15px;opacity:.85;margin-top:6px;position:relative}

.stats-bar{
    display:flex;justify-content:center;gap:18px;padding:14px 16px;
    background:#fff;border-bottom:1px solid var(--border);font-size:15px;flex-wrap:wrap;
}
.stats-bar .stat-item{display:flex;align-items:center;gap:5px}
.stats-bar .stat-item .num{font-weight:700;color:var(--primary);min-width:22px;font-size:17px}

.unit-tabs{
    display:flex;background:#fff;border-bottom:2px solid var(--border);
    overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.unit-tab{
    flex:1;min-width:90px;padding:12px 10px;text-align:center;font-size:15px;
    font-weight:600;color:var(--text-secondary);cursor:pointer;border:none;
    background:none;transition:all .2s;position:relative;white-space:nowrap;
}
.unit-tab.active{color:var(--primary)}
.unit-tab.active::after{
    content:'';position:absolute;bottom:-2px;left:10%;right:10%;height:3px;
    background:var(--primary);border-radius:3px 3px 0 0;
}
.unit-tab:hover{color:var(--primary)}
.unit-tab .badge{
    display:inline-block;font-size:11px;background:var(--primary-bg);color:var(--primary);
    border-radius:10px;padding:0 7px;margin-left:4px;font-weight:600;
}
.unit-tab.active .badge{background:var(--primary);color:#fff}

.main-content{max-width:860px;margin:0 auto;padding:18px}

.mode-switcher{
    display:flex;gap:10px;background:#fff;border-radius:var(--radius);
    padding:7px;box-shadow:var(--shadow);margin-bottom:18px;
}
.mode-btn{
    flex:1;padding:10px 14px;border:none;border-radius:var(--radius-sm);
    font-size:15px;font-weight:600;cursor:pointer;background:transparent;
    color:var(--text-secondary);transition:all .2s;
}
.mode-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.mode-btn:hover:not(.active){background:var(--primary-bg)}

.grade-mode-switch{
    display:flex;gap:8px;align-items:center;background:#fff;
    border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow);margin-bottom:18px;
    font-size:15px;font-weight:600;
}
.grade-mode-switch label{cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;transition:all .2s;font-size:14px}
.grade-mode-switch label.active{background:var(--primary-bg);color:var(--primary)}
.grade-mode-switch input[type=radio]{accent-color:var(--primary);width:18px;height:18px}

.controls{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.controls button{
    padding:10px 20px;border:none;border-radius:var(--radius-sm);font-size:15px;
    font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#4338ca;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)!important}
.btn-outline:hover{background:var(--primary-bg);border-color:var(--primary-light)!important}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#15803d}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-warning{background:var(--warning);color:#fff}
.btn-warning:hover{background:#b45309}

.status-dots{
    display:flex;flex-wrap:wrap;gap:7px;padding:18px;background:#fff;
    border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;
}
.status-dots .dot{
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:13px;font-weight:700;cursor:pointer;
    transition:all .2s;border:2px solid var(--border);color:var(--text-secondary);background:#fff;
}
.status-dots .dot:hover{transform:scale(1.15)}
.status-dots .dot.current{border-color:var(--primary);color:var(--primary);box-shadow:0 0 0 4px rgba(79,70,229,.2)}
.status-dots .dot.known{background:var(--success);border-color:var(--success);color:#fff}
.status-dots .dot.unknown{background:var(--danger);border-color:var(--danger);color:#fff}
.status-dots .dot.seen{background:var(--primary-bg);border-color:var(--primary-light);color:var(--primary)}

.question-card{
    background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:28px;margin-bottom:18px;animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.q-number{font-size:16px;font-weight:700;color:var(--primary);background:var(--primary-bg);padding:5px 14px;border-radius:20px}
.q-unit-label{font-size:14px;color:var(--text-secondary);background:#f1f5f9;padding:4px 12px;border-radius:14px}
.q-title{font-size:20px;font-weight:600;line-height:1.7;margin-bottom:22px;color:var(--text)}

/* 答案输入区 */
.answer-input-area{margin-bottom:18px}
.answer-input-area textarea{
    width:100%;min-height:180px;padding:16px;border:2px solid var(--border);
    border-radius:var(--radius-sm);font-size:16px;line-height:1.8;resize:vertical;
    font-family:inherit;transition:border-color .2s;
}
.answer-input-area textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.answer-input-area textarea::placeholder{color:#cbd5e1}

.q-actions{display:flex;gap:10px;flex-wrap:wrap}
.q-actions button{padding:8px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-show-answer{background:var(--primary-bg);color:var(--primary)}
.btn-show-answer:hover{background:var(--primary);color:#fff}
.btn-known{background:var(--success-bg);color:var(--success)}
.btn-known:hover{background:var(--success);color:#fff}
.btn-unknown{background:var(--danger-bg);color:var(--danger)}
.btn-unknown:hover{background:var(--danger);color:#fff}
.btn-submit{background:var(--primary);color:#fff;font-size:16px;padding:10px 24px}
.btn-submit:hover{background:#4338ca;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}

/* 批改结果区 */
.grade-result{
    margin-top:20px;border-top:2px dashed var(--border);padding-top:20px;display:none;
}
.grade-result.show{display:block;animation:fadeIn .3s ease}
.grade-result .grade-header{
    display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;
}
.grade-result .grade-score{
    font-size:36px;font-weight:800;padding:8px 20px;border-radius:var(--radius-sm);
}
.grade-result .grade-score.high{background:var(--success-bg);color:var(--success)}
.grade-result .grade-score.mid{background:var(--warning-bg);color:var(--warning)}
.grade-result .grade-score.low{background:var(--danger-bg);color:var(--danger)}
.grade-result .grade-label{font-size:16px;font-weight:600;color:var(--text)}
.grade-result .grade-comment{
    background:#f8fafc;padding:16px;border-radius:var(--radius-sm);
    font-size:16px;line-height:1.9;white-space:pre-wrap;
}
.grade-result .grade-detail{
    margin-top:12px;font-size:15px;color:var(--text-secondary);line-height:1.8;
}
.grade-result .grade-detail .point{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.grade-result .grade-detail .point .icon{font-size:18px;flex-shrink:0;margin-top:2px}
.grade-result .grade-detail .point.got{color:var(--success)}
.grade-result .grade-detail .point.miss{color:var(--danger)}

/* 参考答案区 */
.answer-area{
    margin-top:20px;border-top:2px dashed var(--border);padding-top:20px;display:none;
}
.answer-area.show{display:block;animation:fadeIn .3s ease}
.answer-area .label{font-size:14px;font-weight:700;color:var(--success);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.answer-area .content{font-size:16px;line-height:2;color:#1e293b}
.answer-area .content p{margin-bottom:8px}
.answer-area .content .key-point{color:var(--primary);font-weight:600}

/* 评分要点区 */
.key-points-area{
    margin-top:14px;padding:14px 18px;background:var(--warning-bg);
    border-radius:var(--radius-sm);font-size:15px;line-height:1.9;
}
.key-points-area .kp-title{font-weight:700;color:var(--warning);margin-bottom:6px;font-size:14px}
.key-points-area li{margin-bottom:4px;margin-left:20px}

/* 统计面板 */
.stat-panel{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px;display:none}
.stat-panel.show{display:block;animation:fadeIn .3s ease}
.stat-panel h3{font-size:18px;margin-bottom:14px;color:var(--text)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px}
.stat-card{padding:16px;border-radius:var(--radius-sm);text-align:center;background:var(--body-bg)}
.stat-card .stat-num{font-size:32px;font-weight:800}
.stat-card .stat-label{font-size:14px;color:var(--text-secondary);margin-top:5px}
.stat-card.green .stat-num{color:var(--success)}
.stat-card.red .stat-num{color:var(--danger)}
.stat-card.blue .stat-num{color:var(--primary)}
.stat-card.orange .stat-num{color:var(--warning)}

/* 总分面板 */
.total-score-panel{
    background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);
    padding:24px;margin-bottom:18px;text-align:center;display:none;
}
.total-score-panel.show{display:block;animation:fadeIn .3s ease}
.total-score-panel .big-score{
    font-size:64px;font-weight:900;line-height:1;
}
.total-score-panel .big-score.high{color:var(--success)}
.total-score-panel .big-score.mid{color:var(--warning)}
.total-score-panel .big-score.low{color:var(--danger)}
.total-score-panel .score-label{font-size:16px;color:var(--text-secondary);margin-top:6px}
.total-score-panel .score-detail{font-size:14px;color:var(--text-secondary);margin-top:8px}

/* 加载动画 */
.loading{display:inline-block;width:20px;height:20px;border:3px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 响应式 */
@media(max-width:500px){
    .app-header h1{font-size:20px}
    .stats-bar{font-size:13px;gap:10px}
    .unit-tab{font-size:13px;padding:10px 6px;min-width:65px}
    .question-card{padding:18px}
    .q-title{font-size:17px}
    .controls button{font-size:13px;padding:8px 14px}
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .grade-result .grade-score{font-size:28px}
    .total-score-panel .big-score{font-size:48px}
}

@media print{
    .app-header,.stats-bar,.unit-tabs,.mode-switcher,.controls,.status-dots,.q-actions,.stat-panel,.grade-mode-switch,.answer-input-area{display:none!important}
    .question-card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}
    .answer-area,.grade-result{display:block!important}
}
</style>
</head>
<body>
<div class="app-header">
    <h1>📚 八下道法 · 考前必背大题</h1>
    <p>第一~五单元 · 智能抽测系统</p>
</div>
<div class="stats-bar">
    <span class="stat-item">📌 总题数 <span class="num" id="totalCount">0</span></span>
    <span class="stat-item">✅ 已掌握 <span class="num" id="knownCount">0</span></span>
    <span class="stat-item">❌ 需复习 <span class="num" id="unknownCount">0</span></span>
    <span class="stat-item">📖 未看过 <span class="num" id="unseenCount">0</span></span>
    <span class="stat-item">📊 掌握率 <span class="num" id="masteryRate">0%</span></span>
</div>
<div class="unit-tabs" id="unitTabs"></div>
<div class="main-content">
    <div class="mode-switcher">
        <button class="mode-btn active" data-mode="quiz" onclick="setMode('quiz')">🎯 抽测模式</button>
        <button class="mode-btn" data-mode="review" onclick="setMode('review')">📖 复习模式</button>
        <button class="mode-btn" data-mode="stats" onclick="setMode('stats')">📊 统计</button>
    </div>
    <div class="grade-mode-switch" id="gradeModeSwitch">
        <span>🔍 批改方式：</span>
        <label class="active"><input type="radio" name="gradeMode" value="ai" checked onchange="switchGradeMode('ai')">🤖 AI智能批改</label>
        <label><input type="radio" name="gradeMode" value="auto" onchange="switchGradeMode('auto')">📋 要点自动批改</label>
    </div>
    <div class="controls" id="controls">
        <button class="btn-primary" onclick="nextQuestion()">🎲 随机一题</button>
        <button class="btn-outline" onclick="resetUnitProgress()">🔄 重置本单元</button>
        <button class="btn-danger" onclick="resetAllProgress()">⚠️ 全部重置</button>
    </div>
    <div class="status-dots" id="statusDots"></div>
    <div class="total-score-panel" id="totalScorePanel"></div>
    <div id="questionArea"></div>
    <div id="statPanel" class="stat-panel"></div>
</div>
<script>
// ===== API KEY 配置（用户自行填写）=====
const API_BASE = 'http://101.34.88.90:3000/v1';
const API_MODEL = 'qwen3.6';
let API_KEY = localStorage.getItem('glm52_api_key') || '';

// ===== 题库数据 =====
const ALL_QUESTIONS = [
  {id:1,unit:1,unitName:'第一单元',title:'宪法规定的根本内容？',answer:'<p><span class="key-point">①国家性质：</span>中华人民共和国是工人阶级领导的、以工农联盟为基础的人民民主专政的社会主义国家。</p><p><span class="key-point">②根本制度：</span>社会主义制度。</p><p><span class="key-point">③最本质的特征：</span>中国共产党的领导是中国特色社会主义最本质的特征。</p>',keyPoints:['国家性质（人民民主专政）','社会主义制度','党的领导是本质特征']},
  {id:2,unit:1,unitName:'第一单元',title:'宪法的核心地位？',answer:'<p><span class="key-point">①</span>我国宪法是治国安邦的总章程，集中体现了党和人民的统一意志和共同愿望，是国家意志的最高表现形式。</p><p><span class="key-point">②</span>宪法是国家的根本法。</p><p><span class="key-point">③</span>宪法是一切法律法规的总依据、总源头，具有最高的法律地位、法律权威、法律效力。</p><p><span class="key-point">④</span>宪法是一切组织和个人的根本活动准则。</p>',keyPoints:['治国安邦的总章程','国家的根本法','最高的法律地位/权威/效力','一切组织和个人的根本活动准则']},
  {id:3,unit:1,unitName:'第一单元',title:'宪法规范国家权力运行的原因和做法？',answer:'<p><strong>原因：</strong></p><p><span class="key-point">①</span>权力是一把双刃剑，在法治轨道上行使可造福人民，在法律之外行使则祸害国家和人民。</p><p><span class="key-point">②</span>规范国家权力运行以保障公民权利，是我国宪法的核心价值追求。</p><p><strong>做法：</strong></p><p>把权力关进制度的笼子里，即<span class="key-point">依法设定权力、规范权力、制约权力、监督权力</span>。</p>',keyPoints:['权力是双刃剑','规范权力以保障公民权利（核心价值追求）','把权力关进制度笼子','依法设定/规范/制约/监督权力']},
  {id:4,unit:1,unitName:'第一单元',title:'如何依宪治国？',answer:'<p><span class="key-point">①</span>坚持依宪治国，就要坚持宪法确定的党领导地位不动摇，坚持宪法确定的人民民主专政和人民代表大会制度不动摇。</p><p><span class="key-point">②</span>依宪治国要求一切组织和个人必须在宪法和法律范围内活动。</p><p><span class="key-point">③</span>依宪治国需要坚持宪法至上，维护国家法制统一、尊严和权威。</p><p><span class="key-point">④</span>依宪治国需要加强宪法实施和监督。</p>',keyPoints:['坚持党的领导地位不动摇','一切组织和个人在宪法法律范围内活动','坚持宪法至上','加强宪法实施和监督']},
  {id:5,unit:1,unitName:'第一单元',title:'怎样尊崇宪法？',answer:'<p><span class="key-point">①</span>加强宪法宣传教育是实施宪法的重要基础。</p><p><span class="key-point">②</span>我们要依据宪法和法律行使权利，履行义务，增强宪法意识，维护宪法权威。</p><p><span class="key-point">③</span><span class="key-point">认同宪法、学习宪法、践行宪法</span>。</p>',keyPoints:['加强宪法宣传教育','增强宪法意识，维护宪法权威','认同宪法、学习宪法、践行宪法']},
  {id:6,unit:2,unitName:'第二单元',title:'权利与义务的关系？',answer:'<p><span class="key-point">①</span>公民的权利与义务相统一，相互依存、相互促进。</p><p><span class="key-point">②</span>公民既是权利的享有者，又是义务的承担者。</p><p><span class="key-point">③</span>公民的某些权利同时也是义务。</p>',keyPoints:['权利与义务相统一/相互依存/相互促进','既是权利享有者又是义务承担者','某些权利同时也是义务']},
  {id:7,unit:2,unitName:'第二单元',title:'如何正确对待权利和义务的关系？',answer:'<p><span class="key-point">①</span>坚持权利和义务相统一。</p><p><span class="key-point">②</span>没有无义务的权利，也没有无权利的义务。</p><p><span class="key-point">③</span>增强权利意识和义务观念，依法行使权利，自觉履行义务。</p>',keyPoints:['坚持权利和义务相统一','没有无义务的权利/没有无权利的义务','增强权利意识和义务观念']},
  {id:8,unit:2,unitName:'第二单元',title:'公民应怎样行使权利？',answer:'<p><span class="key-point">①</span>任何权利都不是绝对的。</p><p><span class="key-point">②</span>公民行使自由和权利的时候，不得损害国家的、社会的、集体的利益和其他公民的合法的自由和权利。</p><p><span class="key-point">③</span>树立按照法定程序办事的意识。</p><p><span class="key-point">④</span>当合法权益受到侵害时，可以通过<span class="key-point">和解、调解、仲裁和诉讼</span>等方式，依照法定程序来寻求救济、解决纠纷、维护权利。</p>',keyPoints:['权利不是绝对的','不得损害国家/社会/集体/他人利益','按法定程序办事','四种维权方式：和解/调解/仲裁/诉讼']},
  {id:9,unit:2,unitName:'第二单元',title:'怎样依法履行义务？',answer:'<p><span class="key-point">①</span>法律要求做的必须去做。</p><p><span class="key-point">②</span>法律禁止做的坚决不做。</p><p><span class="key-point">③</span>公民违反法律，要依法承担民事责任或行政责任，构成犯罪的，要依法承担刑事责任。</p>',keyPoints:['法律要求做的必须去做','法律禁止做的坚决不做','违反法律要承担法律责任（民事/行政/刑事）']},
  {id:10,unit:2,unitName:'第二单元',title:'人大代表与人民的关系？',answer:'<p><span class="key-point">①</span>人大代表必须与人民群众保持密切联系。</p><p><span class="key-point">②</span>听取和反映人民群众的意见和要求，努力为人民服务。</p><p><span class="key-point">③</span>对人民负责，并接受人民监督。</p>',keyPoints:['与人民群众保持密切联系','听取和反映意见要求','对人民负责，接受人民监督']},
  {id:11,unit:2,unitName:'第二单元',title:'人民代表大会的优越性？',answer:'<p><span class="key-point">①</span>人民代表大会制度是坚持党的领导、人民当家作主、依法治国有机统一的根本政治制度。</p><p><span class="key-point">②</span>最大限度保障人民当家作主。</p><p><span class="key-point">③</span>符合我国国情和实际、能凝聚全体人民力量。</p><p><span class="key-point">④</span>具有强大生命力和优越性。</p>',keyPoints:['党的领导/人民当家作主/依法治国有机统一','最大限度保障人民当家作主','符合国情/凝聚力量','具有强大生命力和优越性']},
  {id:12,unit:3,unitName:'第三单元',title:'什么是公有制经济和非公有制经济？国有经济的地位？',answer:'<p><strong>公有制经济（主体）：</strong>国有经济、集体经济以及混合所有制经济中的国有成分和集体成分。</p><p><span class="key-point">国有经济的地位：</span>国有经济是国民经济的主导力量。</p><p><strong>非公有制经济：</strong>个体经济、私营经济、港澳台投资经济、外商投资经济等。</p>',keyPoints:['公有制：国有/集体/混合中国有成分','国有经济是主导力量','非公有制：个体/私营/港澳台/外资']},
  {id:13,unit:3,unitName:'第三单元',title:'如何坚持和完善社会主义基本经济制度？（两个毫不动摇）',answer:'<p><span class="key-point">①</span>毫不动摇<span class="key-point">巩固和发展</span>公有制经济。</p><p><span class="key-point">②</span>毫不动摇<span class="key-point">鼓励、支持、引导</span>非公有制经济发展。</p>',keyPoints:['毫不动摇巩固和发展公有制经济','毫不动摇鼓励/支持/引导非公有制经济']},
  {id:14,unit:3,unitName:'第三单元',title:'分配制度：按劳分配、按生产要素分配、社会保障收入',answer:'<p>我国在社会主义初级阶段，坚持<span class="key-point">按劳分配为主体、多种分配方式并存</span>的分配制度。</p><p><strong>（1）按劳分配：</strong>由生产资料公有制决定，只存在于公有制经济中。</p><p><strong>（2）按生产要素分配：</strong>让<span class="key-point">劳动、资本、土地、知识、技术、管理、数据</span>等生产要素参与收入分配。</p><p><strong>（3）社会保障收入：</strong>在一定条件下，人们还可以取得社会保障收入，获得社会公益事业的帮助。</p>',keyPoints:['按劳分配为主体、多种分配方式并存','按劳分配由公有制决定','生产要素：劳动/资本/土地/知识/技术/管理/数据','社会保障收入']},
  {id:15,unit:3,unitName:'第三单元',title:'如何坚持和完善社会主义市场经济体制？',answer:'<p><span class="key-point">①</span>要正确处理政府和市场关系。</p><p><span class="key-point">②</span>充分发挥市场在资源配置中的决定性作用，更好发挥政府作用，有效弥补市场缺陷。</p><p><span class="key-point">③</span>实现效率和公平有机统一，在高质量发展中扎实推动全体人民共同富裕。</p>',keyPoints:['正确处理政府和市场关系','市场决定性作用+更好发挥政府作用','效率和公平统一/共同富裕']},
  {id:16,unit:3,unitName:'第三单元',title:'四个政治制度和三个基本经济制度',answer:'<p><strong>四个政治制度：</strong></p><p><span class="key-point">①人民代表大会制度</span>（根本政治制度）</p><p><span class="key-point">②中国共产党领导的多党合作和政治协商制度</span>（基本政治制度）</p><p><span class="key-point">③民族区域自治制度</span>（基本政治制度）</p><p><span class="key-point">④基层群众自治制度</span>（基本政治制度）</p><p><strong>三个基本经济制度：</strong></p><p><span class="key-point">①</span>公有制为主体、多种所有制经济共同发展</p><p><span class="key-point">②</span>按劳分配为主体、多种分配方式并存</p><p><span class="key-point">③</span>社会主义市场经济体制</p>',keyPoints:['人民代表大会制度（根本）','多党合作和政治协商制度（基本）','民族区域自治制度（基本）','基层群众自治制度（基本）','三个基本经济制度']},
  {id:17,unit:3,unitName:'第三单元',title:'公民的基本权利和基本义务',answer:'<p><strong>基本权利：</strong></p><p>①政治权利和自由（选举权和被选举权、言论、出版、集会、结社、游行、示威自由）</p><p>②人身自由（人格尊严不受侵犯、住宅不受侵犯、通信自由和通信秘密受法律保护）</p><p>③社会经济与文化教育权利（财产权、劳动权、受教育权等）</p><p>④其他权利（平等权、宗教信仰自由等）</p><p><strong>基本义务：</strong></p><p>①遵守宪法和法律 ②维护国家统一和全国各民族团结 ③维护国家安全、荣誉和利益 ④依法服兵役 ⑤依法纳税</p>',keyPoints:['政治权利和自由','人身自由','社会经济与文化教育权利','遵守宪法和法律','维护国家统一和民族团结','依法服兵役和纳税']},
  {id:18,unit:4,unitName:'第四单元',title:'人大的职权？',answer:'<p>人民代表大会的职权（全国人大前面加"最高"）：</p><p><span class="key-point">①立法权</span>——法律的制定、修改和废止</p><p><span class="key-point">②决定权</span>——国家大政方针、重大事项和规划的通过等</p><p><span class="key-point">③任免权</span>——选举、决定任免、罢免</p><p><span class="key-point">④监督权</span>——监督宪法和法律实施；听取、审议本级"一府一委两院"的工作报告</p>',keyPoints:['立法权','决定权','任免权','监督权']},
  {id:19,unit:4,unitName:'第四单元',title:'国家权力机关和其他国家机关的关系？',answer:'<p><span class="key-point">①</span>人民代表大会是国家权力机关（全国人民代表大会是最高国家权力机关）。</p><p><span class="key-point">②</span>国家行政机关、监察机关、审判机关、检察机关由本级人民代表大会产生，对它负责，受它监督。</p>',keyPoints:['人大是国家权力机关','其他机关由人大产生/对它负责/受它监督']},
  {id:20,unit:4,unitName:'第四单元',title:'国家权力机关和国家行政机关的关系？',answer:'<p><span class="key-point">①</span>人民代表大会是国家权力机关，国家行政机关是国家权力机关的执行机关。</p><p><span class="key-point">②</span>国家行政机关由人民代表大会产生，对它负责，受它监督。</p>',keyPoints:['人大是国家权力机关','行政机关是权力机关的执行机关','行政机关由人大产生/对它负责/受它监督']},
  {id:21,unit:4,unitName:'第四单元',title:'行政机关和人民的关系？',answer:'<p><span class="key-point">①</span>人民是国家的主人，行政机关的权力是人民通过宪法和法律授予的。</p><p><span class="key-point">②</span>行政机关应当坚持以人民为中心，全心全意为人民服务。</p><p><span class="key-point">③</span>提升人民群众的获得感、幸福感和满意度。</p>',keyPoints:['人民是国家的主人','以人民为中心/为人民服务','提升获得感/幸福感/满意度']},
  {id:22,unit:4,unitName:'第四单元',title:'行政机关如何依法行政？',answer:'<p><span class="key-point">①</span>行政机关必须依法行政。</p><p><span class="key-point">②</span>行政机关要坚持<span class="key-point">法定职责必须为、法无授权不可为</span>，坚决纠正不作为、慢作为、乱作为，坚决克服懒政、怠政。</p><p><span class="key-point">③</span>各级人民政府应当维护宪法和法律权威，建设<span class="key-point">职能科学、权责法定、执法严明、公开公正、智能高效、廉洁诚信、人民满意</span>的法治政府。</p>',keyPoints:['依法行政','法定职责必须为/法无授权不可为','建设法治政府（职能科学/权责法定/执法严明/公开公正/智能高效/廉洁诚信/人民满意）']},
  {id:23,unit:4,unitName:'第四单元',title:'武装力量的性质和任务？',answer:'<p><span class="key-point">性质：</span>中华人民共和国武装力量属于人民。</p><p><span class="key-point">任务：</span>巩固国防，抵抗侵略，保卫祖国，保卫人民的和平劳动，参加国家建设事业，努力为人民服务。</p><p><span class="key-point">国家态度：</span>国家加强武装力量的革命化、现代化、正规化的建设，增强国防力量。</p>',keyPoints:['属于人民','巩固国防/抵抗侵略/保卫祖国','参加国家建设','革命化/现代化/正规化建设']},
  {id:24,unit:4,unitName:'第四单元',title:'监察机关的监察范围？',answer:'<p>监察委员会对<span class="key-point">所有行使公权力的公职人员</span>进行监督，调查职务违法和职务犯罪，开展廉政建设和反腐败工作，维护宪法和法律的尊严。</p>',keyPoints:['所有行使公权力的公职人员','调查职务违法和职务犯罪','廉政建设和反腐败']},
  {id:25,unit:4,unitName:'第四单元',title:'监察委员会如何行使职权？',answer:'<p><span class="key-point">①</span>监察委员会依据法律规定独立行使监察权，不受行政机关、社会团体和个人的干涉。</p><p><span class="key-point">②</span>监察机关办理职务违法和职务犯罪案件，应当与审判机关、检察机关、执法部门互相配合，互相制约。</p><p><span class="key-point">③</span>监察机关在工作中需要协助的，有关机关和单位应当根据监察机关的要求依法予以协助。</p>',keyPoints:['独立行使监察权','与审判/检察/执法部门互相配合和制约','有关机关应依法协助']},
  {id:26,unit:4,unitName:'第四单元',title:'监察机关的职责',answer:'<p><span class="key-point">①监督职责</span></p><p><span class="key-point">②调查职责</span></p><p><span class="key-point">③处置职责</span></p>',keyPoints:['监督职责','调查职责','处置职责']},
  {id:27,unit:4,unitName:'第四单元',title:'监察机关行使职责的意义？',answer:'<p><span class="key-point">①</span>国家监察工作要坚持严厉惩治腐败，有效制约和监督权力，加强法治教育和道德教育，一体推进<span class="key-point">不敢腐、不能腐、不想腐</span>。</p><p><span class="key-point">②</span>减少和遏制腐败行为的发生，维护宪法和法律尊严，保持公权力行使的廉洁性。</p>',keyPoints:['一体推进不敢腐/不能腐/不想腐','减少遏制腐败','维护宪法法律尊严','保持公权力廉洁性']},
  {id:28,unit:4,unitName:'第四单元',title:'人民法院如何行使职权？',answer:'<p><span class="key-point">①</span>人民法院代表国家行使<span class="key-point">审判权</span>，坚持以事实为根据，以法律为准绳。通过审判刑事案件、民事案件、行政案件等，惩罚犯罪，保障无罪的人不受刑事追究，解决纠纷，保护合法权益。</p><p><span class="key-point">②</span>监督行政机关依法行使职权，维护国家安全和社会秩序，维护社会公平正义，维护国家法制统一。</p><p><span class="key-point">③</span>人民法院依照法律规定<span class="key-point">独立行使审判权</span>，不受行政机关、社会团体和个人的干涉。</p>',keyPoints:['行使审判权','以事实为依据/以法律为准绳','独立行使审判权','不受行政机关/社会团体/个人干涉']},
  {id:29,unit:4,unitName:'第四单元',title:'人民检察院如何行使职权？',answer:'<p><span class="key-point">①</span>人民检察院代表国家行使权力，以国家的名义进行法律监督，坚持以事实为根据，以法律为准绳，通过行使<span class="key-point">检察权</span>，追诉犯罪。</p><p><span class="key-point">②</span>维护国家安全和社会秩序，维护合法权益，维护国家利益和社会公共利益，保障法律正确实施，维护社会公平正义。</p><p><span class="key-point">③</span>人民检察院依照法律规定<span class="key-point">独立行使检察权</span>，不受行政机关、社会团体和个人的干涉。</p>',keyPoints:['法律监督机关','行使检察权/追诉犯罪','独立行使检察权','不受行政机关/社会团体/个人干涉']},
  {id:30,unit:4,unitName:'第四单元',title:'易混淆知识点（p10）',answer:'<p><strong>一、权力机关：</strong></p><p>①国家权力机关是<span class="key-point">人民代表大会</span>（全国人大+地方各级人大）</p><p>②最高国家权力机关是<span class="key-point">全国人民代表大会</span></p><p>③全国人大的常设机关是<span class="key-point">全国人大常委会</span></p><p>④人大职权：立法权、决定权、任免权、监督权；全国人大加"最高"</p><p><strong>二、国家主席：</strong>职权：公布法律/发布命令、任免权、外事权、授予荣誉权</p><p><strong>三、行政机关：</strong>国家行政机关是人民政府，最高国家行政机关是<span class="key-point">国务院（中央人民政府）</span></p><p><strong>四、军事机关：</strong>最高军事领导机关是<span class="key-point">中央军事委员会</span>，实行<span class="key-point">主席负责制</span></p><p><strong>五、监察机关：</strong>监察委员会，最高是国家监察委员会。对所有行使公权力的公职人员进行监察</p><p><strong>六、司法机关：</strong>包括审判机关（人民法院）和检察机关（人民检察院）</p>',keyPoints:['人大=权力机关/全国人大=最高','国家主席职权','国务院=最高行政机关','中央军委=最高军事领导机关/主席负责制','监察委监察公职人员','司法机关=法院+检察院']},
  {id:31,unit:5,unitName:'第五单元',title:'全面依法治国的基本要求？',answer:'<p><span class="key-point">①科学立法（权力机关）——前提。</span>推进科学立法、民主立法、依法立法，使每一项立法都符合宪法精神、反映人民意愿，以良法促进发展、保障善治。</p><p><span class="key-point">②严格执法（行政机关）——关键。</span>全面推进严格规范公正文明执法，让执法既有力度又有温度。</p><p><span class="key-point">③公正司法（司法机关）——防线。</span>司法机关依法独立公正行使职权，努力让人民群众在每一个司法案件中感受到公平正义。</p><p><span class="key-point">④全民守法（公民）——基础。</span>弘扬社会主义法治精神，传承中华优秀传统法律文化，使尊法学法守法用法在全社会蔚然成风。</p>',keyPoints:['科学立法（前提）','严格执法（关键）','公正司法（防线）','全民守法（基础）']},

// ===== 核心逻辑 =====
const TOTAL = ALL_QUESTIONS.length;
const BACKEND = 'http://localhost:1101';
let currentMode = 'quiz';
let currentUnit = -1;
let currentIndex = 0;
let progress = {};
let gradeMode = 'ai'; // 'ai' or 'auto'
let scoreRecords = []; // 本次会话评分记录
let totalScore = 0;
let totalMaxScore = 0;

function init() {
    loadProgress();
    renderUnitTabs();
    updateStats();
    if (currentUnit === -1) switchUnit(ALL_QUESTIONS[0].unit);
    // 加载后端评分记录
    fetch(BACKEND + '/api/scores').then(r => r.json()).then(d => {
        if (d.ok && d.scores) { scoreRecords = d.scores; updateTotalScore(); }
    }).catch(() => {});
    // API key 提示
    if (!API_KEY) {
        const k = prompt('🔑 请输入API密钥（留空则仅使用要点自动批改）：');
        if (k) { API_KEY = k.trim(); localStorage.setItem('glm52_api_key', API_KEY); }
    }
}

// ===== 后端数据持久化 =====
function saveProgressToBackend() {
    fetch(BACKEND + '/api/progress', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ progress })
    }).catch(() => {});
}
function loadProgress() {
    fetch(BACKEND + '/api/progress').then(r => r.json()).then(d => {
        if (d.ok && d.progress) progress = d.progress;
    }).catch(() => {
        try { const s = localStorage.getItem('glm52_progress'); if (s) progress = JSON.parse(s); } catch(e) {}
    });
    updateStats();
    renderStatusDots();
}
function saveScoreRecord(record) {
    scoreRecords.push(record);
    totalScore += record.score;
    totalMaxScore += record.maxScore;
    updateTotalScore();
    fetch(BACKEND + '/api/scores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ score: record })
    }).catch(() => {});
}

// ===== 本地存储 =====
function getStatus(id) { return progress[id] || 'unseen'; }
function setStatus(id, status) {
    progress[id] = status;
    saveProgressToBackend();
    updateStats();
    renderStatusDots();
}

// ===== 工具函数 =====
function getUnitQuestions(unit) {
    if (unit === -1) return ALL_QUESTIONS;
    return ALL_QUESTIONS.filter(q => q.unit === unit);
}
function getUnits() {
    const seen = new Set();
    const units = [];
    ALL_QUESTIONS.forEach(q => {
        if (!seen.has(q.unit)) { seen.add(q.unit); units.push({ unit: q.unit, name: q.unitName }); }
    });
    return units;
}

// ===== 渲染 =====
function renderUnitTabs() {
    const container = document.getElementById('unitTabs');
    const units = getUnits();
    let html = '<button class="unit-tab' + (currentUnit === -1 ? ' active' : '') + '" onclick="switchUnit(-1)">📚 全部 <span class="badge">' + TOTAL + '</span></button>';
    units.forEach(u => {
        const count = getUnitQuestions(u.unit).length;
        html += '<button class="unit-tab' + (currentUnit === u.unit ? ' active' : '') + '" onclick="switchUnit(' + u.unit + ')">' + u.name + ' <span class="badge">' + count + '</span></button>';
    });
    container.innerHTML = html;
}

function switchUnit(unit) {
    currentUnit = unit;
    renderUnitTabs();
    const qs = getUnitQuestions(unit);
    if (qs.length === 0) return;
    if (currentIndex >= qs.length) currentIndex = 0;
    renderQuestion();
    renderStatusDots();
    updateStats();
}

function renderStatusDots() {
    const container = document.getElementById('statusDots');
    const qs = getUnitQuestions(currentUnit);
    const currentQ = qs[currentIndex];
    let html = '';
    qs.forEach((q, i) => {
        const status = getStatus(q.id);
        let cls = 'dot';
        if (i === currentIndex && currentQ && q.id === currentQ.id) cls += ' current';
        if (status === 'known') cls += ' known';
        else if (status === 'unknown') cls += ' unknown';
        else if (status === 'seen') cls += ' seen';
        html += '<div class="' + cls + '" onclick="goToQuestion(' + i + ')" title="第' + (i + 1) + '题">' + (i + 1) + '</div>';
    });
    container.innerHTML = html;
}

function goToQuestion(index) {
    const qs = getUnitQuestions(currentUnit);
    if (index >= 0 && index < qs.length) {
        currentIndex = index;
        renderQuestion();
        renderStatusDots();
    }
}

function renderQuestion() {
    const area = document.getElementById('questionArea');
    const qs = getUnitQuestions(currentUnit);
    if (qs.length === 0) {
        area.innerHTML = '<div style="text-align:center;padding:40px;"><div style="font-size:48px;">📭</div><h2>该单元暂无题目</h2></div>';
        return;
    }
    const q = qs[currentIndex];
    const status = getStatus(q.id);
    let statusLabel = '';
    if (status === 'known') statusLabel = '<span style="color:var(--success);font-size:15px;">✅ 已掌握</span>';
    else if (status === 'unknown') statusLabel = '<span style="color:var(--danger);font-size:15px;">❌ 需复习</span>';
    else if (status === 'seen') statusLabel = '<span style="color:var(--warning);font-size:15px;">👁️ 已查看</span>';
    else statusLabel = '<span style="color:var(--text-secondary);font-size:15px;">📌 未开始</span>';
    const globalIndex = ALL_QUESTIONS.findIndex(item => item.id === q.id) + 1;

    let html = '<div class="question-card">';
    html += '<div class="q-header"><div><span class="q-number">#' + globalIndex + '</span> <span class="q-unit-label">' + q.unitName + '</span></div>' + statusLabel + '</div>';
    html += '<div class="q-title">' + q.title + '</div>';

    if (currentMode === 'quiz') {
        // 抽测模式：输入答案
        html += '<div class="answer-input-area"><textarea id="userAnswer" placeholder="✍️ 在此输入你的答案...&#10;&#10;提示：尽量完整作答，涵盖关键要点"></textarea></div>';
        html += '<div class="q-actions">';
        html += '<button class="btn-submit" onclick="submitAnswer(' + q.id + ')">📝 提交批改</button>';
        html += '<button class="btn-show-answer" onclick="toggleAnswer(this)">📖 查看参考答案</button>';
        html += '<button class="btn-known" onclick="markKnown(' + q.id + ')">✅ 已掌握</button>';
        html += '<button class="btn-unknown" onclick="markUnknown(' + q.id + ')">🔄 需复习</button>';
        html += '</div>';
        // 批改结果区
        html += '<div class="grade-result" id="gradeResult-' + q.id + '"></div>';
        // 参考答案区
        html += '<div class="answer-area" id="answer-' + q.id + '"><div class="label">📝 参考答案</div><div class="content">' + q.answer + '</div>';
        // 评分要点
        html += '<div class="key-points-area"><div class="kp-title">🎯 评分要点（共' + q.keyPoints.length + '个）</div><ol>';
        q.keyPoints.forEach(kp => { html += '<li>' + kp + '</li>'; });
        html += '</ol></div></div>';
    } else if (currentMode === 'review') {
        // 复习模式：直接显示答案
        html += '<div class="q-actions">';
        html += '<button class="btn-show-answer" onclick="toggleAnswer(this)" style="display:none">📖 显示答案</button>';
        html += '<button class="btn-known" onclick="markKnown(' + q.id + ')">✅ 已掌握</button>';
        html += '<button class="btn-unknown" onclick="markUnknown(' + q.id + ')">🔄 需复习</button>';
        html += '</div>';
        html += '<div class="answer-area show" id="answer-' + q.id + '"><div class="label">📝 参考答案</div><div class="content">' + q.answer + '</div>';
        html += '<div class="key-points-area"><div class="kp-title">🎯 评分要点（共' + q.keyPoints.length + '个）</div><ol>';
        q.keyPoints.forEach(kp => { html += '<li>' + kp + '</li>'; });
        html += '</ol></div></div>';
    }

    html += '</div>';
    area.innerHTML = html;
}

function toggleAnswer(btn) {
    const card = btn.closest('.question-card');
    const answer = card.querySelector('.answer-area');
    answer.classList.toggle('show');
    const qs = getUnitQuestions(currentUnit);
    const q = qs[currentIndex];
    if (q && getStatus(q.id) === 'unseen') setStatus(q.id, 'seen');
}

// ===== 提交批改 =====
async function submitAnswer(qid) {
    const userAnswer = document.getElementById('userAnswer').value.trim();
    if (!userAnswer) { alert('请先输入你的答案再提交批改！'); return; }

    const q = ALL_QUESTIONS.find(x => x.id === qid);
    if (!q) return;

    const resultDiv = document.getElementById('gradeResult-' + qid);
    resultDiv.innerHTML = '<div style="text-align:center;padding:20px;"><div class="loading"></div><span style="margin-left:10px;font-size:16px;">正在批改中...</span></div>';
    resultDiv.classList.add('show');

    if (gradeMode === 'ai' && API_KEY) {
        await gradeWithAI(q, userAnswer, resultDiv);
    } else {
        gradeWithKeywords(q, userAnswer, resultDiv);
    }
}

// ===== AI批改 =====
async function gradeWithAI(q, userAnswer, resultDiv) {
    const prompt = `你是一位经验丰富的初中道德与法治阅卷老师。请批改以下学生的答题。

【题目】${q.title}
【参考答案】${q.answer.replace(/<[^>]*>/g, '')}
【评分要点】${q.keyPoints.join('、')}
【学生答案】${userAnswer}

请按以下格式回复（JSON格式）：
{
  "score": 数字(满分10分),
  "comment": "评语（50-100字，指出优点和不足，语气鼓励）",
  "got": ["学生答到的要点"],
  "miss": ["学生遗漏的要点"]
}

评分标准：
- 9-10分：要点齐全，表述准确完整
- 7-8分：答到大部分要点，表述较好
- 5-6分：答到一半要点，表述基本正确
- 3-4分：答到少量要点
- 1-2分：只有零星相关内容
- 0分：完全答非所问`;

    try {
        const resp = await fetch(API_BASE + '/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY },
            body: JSON.stringify({
                model: API_MODEL,
                messages: [{ role: 'user', content: prompt }],
                temperature: 0.3,
                max_tokens: 800
            })
        });
        if (!resp.ok) throw new Error('API请求失败: ' + resp.status);
        const data = await resp.json();
        const content = data.choices[0].message.content;
        // 尝试解析JSON
        let result;
        try {
            result = JSON.parse(content.replace(/```json\n?/g, '').replace(/```/g, '').trim());
        } catch(e) {
            // 尝试提取分数
            const scoreMatch = content.match(/"score"\s*:\s*(\d+)/);
            const commentMatch = content.match(/"comment"\s*:\s*"([^"]+)"/);
            result = {
                score: scoreMatch ? parseInt(scoreMatch[1]) : 5,
                comment: commentMatch ? commentMatch[1] : content,
                got: [],
                miss: []
            };
        }
        renderGradeResult(resultDiv, result, q);
        saveScoreRecord({ qid: q.id, title: q.title, score: result.score, maxScore: 10, mode: 'ai', time: new Date().toISOString() });
        // 自动标记
        if (result.score >= 7) setStatus(q.id, 'known');
        else if (result.score <= 4) setStatus(q.id, 'unknown');
        else setStatus(q.id, 'seen');
    } catch(e) {
        resultDiv.innerHTML = '<div style="color:var(--danger);padding:16px;">❌ AI批改失败：' + e.message + '<br><small>请检查API密钥是否正确，或切换到"要点自动批改"模式</small></div>';
        resultDiv.classList.add('show');
    }
}

        '依法行政': ['依法行政'],
        '法定职责必须为': ['法定职责', '必须为', '法无授权', '不可为'],
        '法治政府': ['法治政府'],
        '属于人民': ['属于人民', '武装力量'],
        '巩固国防': ['巩固国防', '抵抗侵略', '保卫祖国'],
        '革命化现代化正规化': ['革命化', '现代化', '正规化'],
        '公职人员': ['公职人员', '行使公权力'],
        '职务违法': ['职务违法', '职务犯罪'],
        '廉政建设': ['廉政', '反腐败'],
        '独立行使监察权': ['独立行使', '监察权'],
        '互相配合制约': ['互相配合', '互相制约'],
        '监督职责': ['监督职责'],
        '调查职责': ['调查职责'],
        '处置职责': ['处置职责'],
        '不敢腐不能腐不想腐': ['不敢腐', '不能腐', '不想腐'],
        '廉洁性': ['廉洁'],
        '审判权': ['审判权'],
        '以事实为依据': ['以事实为依据', '以法律为准绳'],
        '独立行使审判权': ['独立行使', '审判权'],
        '检察权': ['检察权', '法律监督'],
        '独立行使检察权': ['独立行使', '检察权'],
        '科学立法': ['科学立法'],
        '严格执法': ['严格执法'],
        '公正司法': ['公正司法'],
        '全民守法': ['全民守法'],
        '改革是动力': ['改革', '动力'],
        '法治是依托': ['法治', '依托'],
        '相辅相成': ['相辅相成', '相互促进'],
        '在法治下推进改革': ['在法治下', '推进改革'],
        '在改革中完善法治': ['在改革中', '完善法治'],
        '德治': ['德治', '道德'],
        '依法治国以德治国': ['依法治国', '以德治国'],
        '法治信念': ['信念', '信心'],
        '法治思维': ['法治思维'],
        '法治观念道德素养': ['法治观念', '道德素养'],
        '青春力量': ['青春力量', '贡献'],
    };

    q.keyPoints.forEach(kp => {
        let matched = false;
        // 尝试匹配关键词
        for (const [key, words] of Object.entries(keywordsMap)) {
            if (kp.includes(key) || words.some(w => kp.includes(w))) {
                if (words.some(w => lower.includes(w.toLowerCase()))) {
                    matched = true;
                    break;
                }
            }
        }
        if (matched) got.push(kp);
        else miss.push(kp);
    });

    const score = q.keyPoints.length > 0 ? Math.round(got.length / q.keyPoints.length * 10) : 5;
    const result = {
        score: score,
        comment: score >= 8 ? '很棒！要点基本都答到了，继续保持！' :
                 score >= 6 ? '不错！答到了大部分要点，再巩固一下遗漏的内容。' :
                 score >= 4 ? '还需要加强，建议对照参考答案认真复习。' :
                 '需要重点复习这道题，建议先看参考答案再重新作答。',
        got: got,
        miss: miss
    };
    renderGradeResult(resultDiv, result, q);
    saveScoreRecord({ qid: q.id, title: q.title, score: result.score, maxScore: 10, mode: 'auto', time: new Date().toISOString() });
    if (result.score >= 7) setStatus(q.id, 'known');
    else if (result.score <= 4) setStatus(q.id, 'unknown');
    else setStatus(q.id, 'seen');
}

function renderGradeResult(div, result, q) {
    const scoreClass = result.score >= 8 ? 'high' : result.score >= 5 ? 'mid' : 'low';
    let html = '<div class="grade-header">';
    html += '<div class="grade-score ' + scoreClass + '">' + result.score + '<span style="font-size:18px">/10分</span></div>';
    html += '<div class="grade-label">' + (result.score >= 8 ? '🌟 优秀！' : result.score >= 5 ? '👍 继续加油' : '💪 需要加强') + '</div>';
    html += '</div>';
    html += '<div class="grade-comment">💬 ' + result.comment + '</div>';
    html += '<div class="grade-detail">';
    if (result.got && result.got.length > 0) {
        html += '<p style="color:var(--success);font-weight:600;margin-bottom:4px;">✅ 答到的要点：</p>';
        result.got.forEach(p => { html += '<div class="point got"><span class="icon">✅</span><span>' + p + '</span></div>'; });
    }
    if (result.miss && result.miss.length > 0) {
        html += '<p style="color:var(--danger);font-weight:600;margin-bottom:4px;margin-top:8px;">❌ 遗漏的要点：</p>';
        result.miss.forEach(p => { html += '<div class="point miss"><span class="icon">❌</span><span>' + p + '</span></div>'; });
    }
    html += '</div>';
    div.innerHTML = html;
    div.classList.add('show');
}

// ===== 标记 =====
function markKnown(id) { setStatus(id, 'known'); autoNext(); }
function markUnknown(id) { setStatus(id, 'unknown'); autoNext(); }
function autoNext() { setTimeout(() => nextQuestion(), 400); }

function nextQuestion() {
    const qs = getUnitQuestions(currentUnit);
    if (qs.length === 0) return;
    const unknown = qs.filter(q => getStatus(q.id) === 'unknown');
    const unseen = qs.filter(q => getStatus(q.id) === 'unseen');
    const seen = qs.filter(q => getStatus(q.id) === 'seen');
    let target;
    if (unknown.length > 0) target = unknown[Math.floor(Math.random() * unknown.length)];
    else if (unseen.length > 0) target = unseen[Math.floor(Math.random() * unseen.length)];
    else if (seen.length > 0) target = seen[Math.floor(Math.random() * seen.length)];
    else target = qs[Math.floor(Math.random() * qs.length)];
    const newIndex = qs.findIndex(q => q.id === target.id);
    if (newIndex !== -1) { currentIndex = newIndex; renderQuestion(); renderStatusDots(); }
}

// ===== 统计 =====
function updateStats() {
    const qs = getUnitQuestions(currentUnit);
    const total = qs.length;
    let known = 0, unknown = 0, unseen = 0;
    qs.forEach(q => {
        const s = getStatus(q.id);
        if (s === 'known') known++;
        else if (s === 'unknown') unknown++;
        else unseen++;
    });
    document.getElementById('totalCount').textContent = total;
    document.getElementById('knownCount').textContent = known;
    document.getElementById('unknownCount').textContent = unknown;
    document.getElementById('unseenCount').textContent = unseen;
    document.getElementById('masteryRate').textContent = total > 0 ? Math.round(known / total * 100) + '%' : '0%';
}

function updateTotalScore() {
    const panel = document.getElementById('totalScorePanel');
    if (scoreRecords.length === 0) { panel.classList.remove('show'); return; }
    const total = scoreRecords.reduce((s, r) => s + r.score, 0);
    const max = scoreRecords.reduce((s, r) => s + r.maxScore, 0);
    const avg = Math.round(total / scoreRecords.length * 10) / 10;
    const rate = max > 0 ? Math.round(total / max * 100) : 0;
    const cls = rate >= 80 ? 'high' : rate >= 50 ? 'mid' : 'low';
    panel.innerHTML = '<div class="big-score ' + cls + '">' + total + '<span style="font-size:24px">/' + max + '</span></div><div class="score-label">📊 累计得分 | 共' + scoreRecords.length + '次批改 | 均分' + avg + '</div><div class="score-detail">得分率 ' + rate + '%</div>';
    panel.classList.add('show');
}

// ===== 模式切换 =====
function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
    const statPanel = document.getElementById('statPanel');
    const questionArea = document.getElementById('questionArea');
    const controls = document.getElementById('controls');
    const statusDots = document.getElementById('statusDots');
    const gradeSwitch = document.getElementById('gradeModeSwitch');
    if (mode === 'stats') {
        statPanel.classList.add('show');
        questionArea.innerHTML = '';
        controls.style.display = 'none';
        statusDots.style.display = 'none';
        gradeSwitch.style.display = 'none';
        renderStats();
    } else {
        statPanel.classList.remove('show');
        controls.style.display = 'flex';
        statusDots.style.display = 'flex';
        gradeSwitch.style.display = (mode === 'quiz') ? 'flex' : 'none';
        renderQuestion();
        renderStatusDots();
    }
}

function switchGradeMode(mode) {
    gradeMode = mode;
    document.querySelectorAll('#gradeModeSwitch label').forEach(l => l.classList.toggle('active', l.querySelector('input').value === mode));
    if (mode === 'ai' && !API_KEY) {
        const k = prompt('🔑 请输入API密钥以使用AI批改：');
        if (k) { API_KEY = k.trim(); localStorage.setItem('glm52_api_key', API_KEY); }
        else { gradeMode = 'auto'; document.querySelector('input[value="auto"]').checked = true; switchGradeMode('auto'); return; }
    }
}

function renderStats() {
    const panel = document.getElementById('statPanel');
    const units = getUnits();
    let totalKnown = 0, totalUnknown = 0, totalUnseen = 0;
    ALL_QUESTIONS.forEach(q => {
        const s = getStatus(q.id);
        if (s === 'known') totalKnown++;
        else if (s === 'unknown') totalUnknown++;
        else totalUnseen++;
    });
    let html = '<h3>📊 学习统计</h3><div class="stat-grid">';
    html += '<div class="stat-card blue"><div class="stat-num">' + TOTAL + '</div><div class="stat-label">总题数</div></div>';
    html += '<div class="stat-card green"><div class="stat-num">' + totalKnown + '</div><div class="stat-label">✅ 已掌握</div></div>';
    html += '<div class="stat-card red"><div class="stat-num">' + totalUnknown + '</div><div class="stat-label">❌ 需复习</div></div>';
    html += '<div class="stat-card orange"><div class="stat-num">' + totalUnseen + '</div><div class="stat-label">📖 未看过</div></div>';
    html += '</div>';
    html += '<h3 style="margin-top:20px;">📁 各单元详情</h3><div class="stat-grid">';
    units.forEach(u => {
        const qs = getUnitQuestions(u.unit);
        const total = qs.length;
        let known = 0;
        qs.forEach(q => { if (getStatus(q.id) === 'known') known++; });
        const rate = total > 0 ? Math.round(known / total * 100) + '%' : '0%';
        html += '<div class="stat-card"><div class="stat-num" style="font-size:20px;color:var(--primary);">' + rate + '</div><div class="stat-label"><strong>' + u.name + '</strong><br>' + known + '/' + total + ' 题</div></div>';
    });
    html += '</div>';
    // 评分记录
    if (scoreRecords.length > 0) {
        html += '<h3 style="margin-top:20px;">📝 评分记录</h3>';
        html += '<div style="max-height:300px;overflow-y:auto;font-size:14px;">';
        scoreRecords.slice().reverse().forEach(r => {
            html += '<div style="padding:8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;">';
            html += '<span>' + (r.title || '') + '</span>';
            html += '<span style="font-weight:700;color:' + (r.score >= 8 ? 'var(--success)' : r.score >= 5 ? 'var(--warning)' : 'var(--danger)') + ';">' + r.score + '/' + r.maxScore + ' (' + (r.mode === 'ai' ? '🤖AI' : '📋要点') + ')</span>';
            html += '</div>';
        });
        html += '</div>';
    }
    panel.innerHTML = html;
}

// ===== 重置 =====
function resetUnitProgress() {
    if (!confirm('确定要重置当前单元的所有进度吗？')) return;
    const qs = getUnitQuestions(currentUnit);
    qs.forEach(q => { delete progress[q.id]; });
    saveProgressToBackend();
    updateStats();
    renderStatusDots();
    renderQuestion();
}
function resetAllProgress() {
    if (!confirm('确定要重置所有单元的进度吗？此操作不可撤销！')) return;
    progress = {};
    saveProgressToBackend();
    updateStats();
    renderStatusDots();
    renderQuestion();
}

// ===== 键盘快捷键 =====
document.addEventListener('keydown', function(e) {
    if (currentMode === 'stats') return;
    if (e.target.tagName === 'TEXTAREA') return; // 不在输入框中拦截
    switch(e.key) {
        case ' ': case 'Enter':
            e.preventDefault();
            const btn = document.querySelector('.btn-show-answer');
            if (btn) btn.click();
            break;
        case '1':
            const kBtn = document.querySelector('.btn-known');
            if (kBtn) kBtn.click();
            break;
        case '2':
            const uBtn = document.querySelector('.btn-unknown');
            if (uBtn) uBtn.click();
            break;
        case 'n': case 'N':
            nextQuestion();
            break;
        case 's': case 'S':
            const sBtn = document.querySelector('.btn-submit');
            if (sBtn) sBtn.click();
            break;
    }
});

// ===== 初始化 =====
init();
</script>
